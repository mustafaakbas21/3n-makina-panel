<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3N Makine — Giriş</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-page">
  <div class="login-shell">
    <section class="login-hero" aria-hidden="false">
      <div class="login-hero__waves" aria-hidden="true">
        <div class="login-hero__wave login-hero__wave--3"></div>
        <div class="login-hero__wave login-hero__wave--2"></div>
        <div class="login-hero__wave login-hero__wave--1"></div>
      </div>
      <div class="login-hero__content">
        <div class="login-hero__orb" aria-hidden="true"></div>
        <h1 class="login-hero__title">Welcome to the community</h1>
        <p class="login-hero__subtitle">Login to explore</p>
      </div>
    </section>

    <section class="login-panel" aria-labelledby="loginHeading">
      <div class="login-card">
        <div class="login-card__brand">
          <div class="login-card__logo" aria-hidden="true">
            <i class="fa-solid fa-gears"></i>
          </div>
          <div class="login-card__titles">
            <h2 id="loginHeading" class="login-card__heading">Giriş yap</h2>
            <p class="login-card__hint">Paneline erişmek için bilgilerini gir.</p>
          </div>
        </div>

        <form id="loginForm" class="login-form" novalidate>
          <div class="login-field">
            <label for="loginEmail">E-mail</label>
            <input
              type="text"
              id="loginEmail"
              name="email"
              autocomplete="username"
              placeholder="ornek@firma.com"
              required
            />
          </div>
          <div class="login-field">
            <label for="loginPassword">Şifre</label>
            <input
              type="password"
              id="loginPassword"
              name="password"
              autocomplete="current-password"
              placeholder="••••••••"
              required
            />
          </div>

          <p id="loginError" class="login-error" role="alert" hidden></p>

          <button type="submit" class="login-submit">Continue</button>
        </form>

        <p class="login-footer">3N Makine Yönetim Paneli</p>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
  <script>
    console.log("Appwrite SDK yüklendi");
  </script>
  <script src="js/login.js"></script>
</body>
</html>
