<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3N Makine — Giriş</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./css/login.css" />
  <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
  <script>
    console.log("Appwrite SDK yüklendi");
  </script>
</head>
<body class="login-page">
  <div class="login-shell">
    <section class="login-hero" aria-labelledby="loginHeroTitle">
      <div class="login-hero__mesh" aria-hidden="true"></div>
      <div class="login-hero__waves" aria-hidden="true">
        <div class="login-hero__wave login-hero__wave--3"></div>
        <div class="login-hero__wave login-hero__wave--2"></div>
        <div class="login-hero__wave login-hero__wave--1"></div>
      </div>
      <div class="login-hero__content">
        <div class="login-hero__orb" aria-hidden="true"></div>
        <p class="login-hero__eyebrow">3N Makine</p>
        <h1 id="loginHeroTitle" class="login-hero__title">Yönetim paneline hoş geldiniz</h1>
        <p class="login-hero__subtitle">
          Raporlar, şirket kayıtları ve QR işlemleri tek yerden. Güvenli oturum için bilgilerinizi girin.
        </p>
      </div>
    </section>

    <section class="login-panel" aria-labelledby="loginHeading">
      <div class="login-card">
        <div class="login-card__brand">
          <div class="login-card__logo" aria-hidden="true">
            <i class="fa-solid fa-gears"></i>
          </div>
          <div class="login-card__titles">
            <h2 id="loginHeading" class="login-card__heading">Oturum aç</h2>
            <p class="login-card__hint">Devam etmek için kullanıcı adı ve şifrenizi yazın.</p>
          </div>
        </div>

        <form id="loginForm" class="login-form" novalidate>
          <div class="login-field">
            <label for="loginEmail">Kullanıcı adı veya e-posta</label>
            <input
              type="text"
              id="loginEmail"
              name="email"
              autocomplete="username"
              placeholder="örnek@firma.com"
              required
            />
          </div>
          <div class="login-field login-field--password">
            <label for="loginPassword">Şifre</label>
            <div class="login-password-wrap">
              <input
                type="password"
                id="loginPassword"
                name="password"
                class="login-password-input"
                autocomplete="current-password"
                placeholder="Şifrenizi girin"
                required
              />
              <button
                type="button"
                class="login-password-toggle"
                id="loginPasswordToggle"
                aria-label="Şifreyi göster"
                aria-pressed="false"
                title="Şifreyi göster"
              >
                <i class="fa-regular fa-eye" aria-hidden="true"></i>
              </button>
            </div>
          </div>

          <p id="loginError" class="login-error" role="alert" hidden></p>

          <button type="submit" class="login-submit">
            <span>Giriş yap</span>
            <i class="fa-solid fa-arrow-right login-submit__icon" aria-hidden="true"></i>
          </button>
        </form>

        <p class="login-footer">3N Makine · Yönetim paneli</p>
      </div>
    </section>
  </div>

  <script src="./js/login.js"></script>
</body>
</html>
