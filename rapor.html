<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3N Makine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 45%, #0f172a 100%);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }
    .rapor-card {
      text-align: center;
      max-width: 28rem;
      padding: 2rem 1.75rem;
      border-radius: 20px;
      background: rgba(30, 41, 59, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }
    .rapor-card h1 {
      margin: 0 0 0.75rem;
      font-size: 1.15rem;
      font-weight: 600;
    }
    .rapor-card p {
      margin: 0;
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <div class="rapor-card">
    <h1>Bu sayfa artık kullanılmıyor</h1>
    <p>
      Rapor PDF’lerindeki karekodlar doğrudan Appwrite depo bağlantısına yönlendirir.
      Eski basılı PDF’lerdeki karekodlar geçerli olmayabilir; güncel PDF için QR Stüdyosu’ndan yeni çıktı alın.
    </p>
  </div>
</body>
</html>
